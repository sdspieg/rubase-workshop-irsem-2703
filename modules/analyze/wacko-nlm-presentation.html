<!DOCTYPE html>
<html lang="en">
<!-- HCSS_DASHBOARD_RESTYLE_2026_05_05 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WACKO - Kremlin Ideological Telemetry</title><link rel="stylesheet" href="../../presentation-styles.css">
    <style>
        .presentation-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: var(--primary-bg);
        }

        .slide {
            width: 100%;
            height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            background: var(--primary-bg);
            position: relative;
            padding: 0;
            border-radius: 0;
        }

        .slide.active { display: flex; }

        .slide img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }

        /* Navigation arrows on left and right */
        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30, 41, 59, 0.7);
            color: var(--accent-cyan, #dbad50);
            border: 1px solid rgba(100, 255, 218, 0.3);
            width: 50px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 100;
            border-radius: 8px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            opacity: 0.6;
        }

        .nav-arrow:hover {
            opacity: 1;
            background: rgba(219,173,80, 0.15);
            border-color: var(--accent-cyan, #dbad50);
        }

        .nav-arrow:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .nav-arrow.left { left: 15px; }
        .nav-arrow.right { right: 15px; }

        /* Bottom bar - thin full-width strip */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 6px 20px;
            background: rgba(13,31,60, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(100, 255, 218, 0.2);
            z-index: 100;
        }

        .bottom-bar .nav-btn {
            background: linear-gradient(135deg, #dbad50, #0099ff);
            color: #0a192f;
            border: none;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: system-ui, sans-serif;
        }

        .bottom-bar .nav-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.5);
        }

        .slide-indicator {
            color: #64ffda;
            font-weight: 700;
            font-size: 0.8rem;
            font-family: system-ui, sans-serif;
        }

        .progress-bar {
            position: fixed;
            bottom: 34px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(42, 63, 95, 0.5);
            z-index: 101;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #dbad50, #0099ff);
            transition: width 0.3s ease;
        }

        @media (max-width: 768px) {
            .nav-arrow { width: 36px; height: 60px; font-size: 1.2rem; }
            .nav-arrow.left { left: 5px; }
            .nav-arrow.right { right: 5px; }
            .bottom-bar { padding: 8px 10px; gap: 8px; }
            .bottom-bar .nav-btn { padding: 5px 10px; font-size: 0.75rem; }
        }
        /* HCSS_FULLSCREEN_CHIP — fixed bottom-right pill, dashboard palette */
        .hcss-fs-chip {
            position: fixed;
            bottom: 14px;
            right: 14px;
            z-index: 99999;
            background: rgba(26,55,97,.92);
            color: #dbad50;
            border: 1.5px solid #dbad50;
            border-radius: 18px;
            padding: .4rem .85rem;
            font-size: .8rem;
            font-weight: 700;
            font-family: system-ui, -apple-system, "Segoe UI", Helvetica, sans-serif;
            cursor: pointer;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: background .14s, color .14s;
            text-decoration: none;
            white-space: nowrap;
            line-height: 1;
        }
        .hcss-fs-chip:hover { background: #dbad50; color: #1a3761; }
        .hcss-fs-chip:active { transform: translateY(1px); }
        .hcss-fs-chip:fullscreen, html:fullscreen .hcss-fs-chip,
        :fullscreen .hcss-fs-chip { display: inline-flex; }
        /* Hide any pre-existing fullscreen button so we don't end up with two */
        .fullscreen-btn { display: none !important; }
        @media (max-width: 600px) {
            .hcss-fs-chip { padding: .3rem .55rem; font-size: .72rem; bottom: 10px; right: 10px; }
        }
        /* HCSS_SLIDE_FIT — full slide always visible, fully responsive */
        html, body { height: 100%; overflow: hidden; }
        .slide.active { overflow: visible; }


    </style>
    <!-- HCSS_FULLSCREEN_CHIP_2026_05_05 -->
    
<script>
(function(){
  if (window._hcssFsChipBound) return;
  window._hcssFsChipBound = true;
  window.toggleHcssFullscreen = function(){
    if (!document.fullscreenElement) {
      (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen).call(document.documentElement);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  };
})();
</script>
    <!-- HCSS_SLIDE_FIT_2026_05_05 -->
    
<script>
(function(){
  if (window._hcssSlideFitBound) return;
  window._hcssSlideFitBound = true;
  // Map: slide element → { w, h } natural dimensions measured before scaling.
  const naturals = new WeakMap();
  function measure(slide){
    const prev = slide.style.transform;
    slide.style.transform = '';
    const w = Math.max(slide.offsetWidth, slide.scrollWidth);
    const h = Math.max(slide.offsetHeight, slide.scrollHeight);
    slide.style.transform = prev;
    if (w && h) naturals.set(slide, { w, h });
  }
  function fit(){
    const slides = document.querySelectorAll('.slide');
    if (!slides.length) return;
    // Use chrome budget so prev/next/counter/fullscreen-chip don't get covered
    const reservedTop = 16, reservedBottom = 56, reservedX = 24;
    const availW = Math.max(200, window.innerWidth - reservedX * 2);
    const availH = Math.max(200, window.innerHeight - reservedTop - reservedBottom);
    slides.forEach(slide => {
      if (!naturals.has(slide)) measure(slide);
      const nat = naturals.get(slide);
      if (!nat) return;
      const scale = Math.min(availW / nat.w, availH / nat.h, 1);
      slide.style.transformOrigin = 'center top';
      slide.style.transform = scale < 1 ? `scale(${scale})` : '';
    });
  }
  let _t;
  function fitDebounced(){ clearTimeout(_t); _t = setTimeout(fit, 60); }
  window.addEventListener('resize', fitDebounced);
  window.addEventListener('orientationchange', fitDebounced);
  // Initial pass on load + a delayed re-measure (some decks lazy-load images
  // or apply layout post-load and the natural size only stabilises after
  // ~300-600 ms).
  function init(){ document.querySelectorAll('.slide').forEach(measure); fit(); }
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(init, 50);
  } else {
    window.addEventListener('DOMContentLoaded', init);
  }
  setTimeout(init, 600);
  // Re-fit when slides switch (.active class moves). Re-measure too — the
  // newly-active slide may have different natural dimensions than the
  // previous one.
  const mo = new MutationObserver(() => {
    document.querySelectorAll('.slide').forEach(s => { if (s.classList.contains('active') && !naturals.has(s)) measure(s); });
    fitDebounced();
  });
  mo.observe(document.body, { attributes: true, subtree: true, attributeFilter: ['class'] });
})();
</script>


</head>
<body>
    <button class="hcss-fs-chip" onclick="toggleHcssFullscreen()" title="Toggle fullscreen (F or Esc)">⛶ Fullscreen</button>
    <div class="presentation-container">
        <div class="slide active" data-slide="1"><img src="wacko-nlm-slides/slide-1.png" alt="Slide 1"></div>
        <div class="slide" data-slide="2"><img src="wacko-nlm-slides/slide-2.png" alt="Slide 2"></div>
        <div class="slide" data-slide="3"><img src="wacko-nlm-slides/slide-3.png" alt="Slide 3 - Ratchet Effect (stylized)"></div>
        <div class="slide" data-slide="4"><img src="wacko-nlm-slides/slide-3b.png" alt="Slide 3b - Ratchet Effect (real data)"></div>
        <div class="slide" data-slide="5"><img src="wacko-nlm-slides/slide-4.png" alt="Slide 5"></div>
        <div class="slide" data-slide="6"><img src="wacko-nlm-slides/slide-5.png" alt="Slide 6"></div>
        <div class="slide" data-slide="7"><img src="wacko-nlm-slides/slide-6.png" alt="Slide 7"></div>
        <div class="slide" data-slide="8"><img src="wacko-nlm-slides/slide-7.png" alt="Slide 8"></div>
        <div class="slide" data-slide="9"><img src="wacko-nlm-slides/slide-8.png" alt="Slide 9"></div>
        <div class="slide" data-slide="10"><img src="wacko-nlm-slides/slide-9.png" alt="Slide 10"></div>
        <div class="slide" data-slide="11"><img src="wacko-nlm-slides/slide-10.png" alt="Slide 11"></div>
        <div class="slide" data-slide="12"><img src="wacko-nlm-slides/slide-11.png" alt="Slide 12"></div>
        <div class="slide" data-slide="13"><img src="wacko-nlm-slides/slide-12.png" alt="Slide 13"></div>
        <div class="slide" data-slide="14"><img src="wacko-nlm-slides/slide-13.png" alt="Slide 14"></div>
        <div class="slide" data-slide="15"><img src="wacko-nlm-slides/slide-14.png" alt="Slide 15"></div>
        <div class="slide" data-slide="16"><img src="wacko-nlm-slides/slide-15.png" alt="Slide 16"></div>
    </div>

    <!-- Navigation Arrows -->
    <button class="nav-arrow left" id="prevArrow" onclick="changeSlide(-1)">&larr;</button>
    <button class="nav-arrow right" id="nextArrow" onclick="changeSlide(1)">&rarr;</button>

    <!-- Progress Bar -->
    <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <button class="nav-btn" onclick="window.location.href='../../index.html'">Home</button>
        <span class="slide-indicator" id="slideIndicator">1 / 16</span>
        <button class="nav-btn" onclick="window.open('http://138.201.62.161:8057/', '_blank')">Sunburst</button>
        <button class="nav-btn" onclick="window.open('http://138.201.62.161:9081/', '_blank')">RuBase Overview</button>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 16;

        function showSlide(n) {
            currentSlide = n;
            if (currentSlide > totalSlides) currentSlide = totalSlides;
            if (currentSlide < 1) currentSlide = 1;

            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            const target = document.querySelector(`.slide[data-slide="${currentSlide}"]`);
            if (target) target.classList.add('active');

            document.getElementById('prevArrow').disabled = currentSlide === 1;
            document.getElementById('nextArrow').disabled = currentSlide === totalSlides;
            document.getElementById('slideIndicator').textContent = `${currentSlide} / ${totalSlides}`;
            document.getElementById('progressBar').style.width = `${(currentSlide / totalSlides) * 100}%`;
        }

        function changeSlide(dir) { showSlide(currentSlide + dir); }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            else if (e.key === 'ArrowRight') changeSlide(1);
            else if (e.key === 'Home') showSlide(1);
            else if (e.key === 'End') showSlide(totalSlides);
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].screenX - touchStartX;
            if (dx < -50) changeSlide(1);
            if (dx > 50) changeSlide(-1);
        });

        // Preload images
        for (let i = 1; i <= totalSlides; i++) {
            const img = new Image();
            img.src = `wacko-nlm-slides/slide-${i}.png`;
        }

        showSlide(1);
    </script>
</body>
</html>
