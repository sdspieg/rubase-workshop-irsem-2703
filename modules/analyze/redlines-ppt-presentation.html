<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Applying AI to Decipher Putin's Red Lines</title>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a192f; font-family:'Titillium Web',sans-serif; overflow:hidden; }
.slide { display:none; width:100vw; height:100vh; justify-content:center; align-items:center; background:#0a192f; }
.slide.active { display:flex; }
.slide img { max-width:100%; max-height:calc(100vh - 36px); object-fit:contain; }
.nav-arrow { position:fixed; top:50%; transform:translateY(-50%); background:rgba(30,41,59,.7); color:#00ffff; border:1px solid rgba(100,255,218,.3); width:44px; height:70px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; cursor:pointer; z-index:100; border-radius:8px; opacity:.5; transition:all .3s; }
.nav-arrow:hover { opacity:1; background:rgba(0,255,255,.15); }
.nav-arrow:disabled { opacity:.15; cursor:not-allowed; }
.nav-arrow.left { left:12px; }
.nav-arrow.right { right:12px; }
.bar { position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center; align-items:center; gap:12px; padding:5px 20px; background:rgba(10,14,39,.95); border-top:1px solid rgba(100,255,218,.2); z-index:100; }
.bar button { background:#00ffff; color:#0a192f; border:none; padding:4px 14px; border-radius:16px; font-weight:600; font-size:.75rem; cursor:pointer; font-family:inherit; }
.bar button:hover { opacity:.8; }
.bar span { color:#64ffda; font-weight:700; font-size:.8rem; }
.prog { position:fixed; bottom:32px; left:0; right:0; height:2px; background:rgba(42,63,95,.5); z-index:101; }
.prog-fill { height:100%; background:#00ffff; transition:width .3s; }
@media (max-width:768px) { .nav-arrow { width:36px; height:60px; font-size:1.2rem; } .nav-arrow.left { left:5px; } .nav-arrow.right { right:5px; } }
</style>
</head>
<body>
<div class="slide active" data-slide="1"><img src="redlines-ppt-slides/slide-1.png" alt="Slide 1"></div>

<button class="nav-arrow left" id="prev" onclick="go(-1)">&larr;</button>
<button class="nav-arrow right" id="next" onclick="go(1)">&rarr;</button>
<div class="prog"><div class="prog-fill" id="prog"></div></div>
<div class="bar">
<button onclick="window.location.href='../../index.html'">Home</button>
<span id="ind">1 / 34</span>
</div>
<script>
let c=1, t=34;
function show(n){ c=Math.max(1,Math.min(t,n)); document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active')); document.querySelector('[data-slide="'+c+'"]').classList.add('active'); document.getElementById('prev').disabled=c===1; document.getElementById('next').disabled=c===t; document.getElementById('ind').textContent=c+' / '+t; document.getElementById('prog').style.width=(c/t*100)+'%'; }
function go(d){ show(c+d); }
document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft')go(-1); if(e.key==='ArrowRight')go(1); if(e.key==='Home')show(1); if(e.key==='End')show(t); });
let tx=0; document.addEventListener('touchstart',e=>tx=e.changedTouches[0].screenX); document.addEventListener('touchend',e=>{ let d=e.changedTouches[0].screenX-tx; if(d<-50)go(1); if(d>50)go(-1); });
for(let i=1;i<=t;i++){ let img=new Image(); img.src='redlines-ppt-slides/slide-'+i+'.png'; }
</script>
