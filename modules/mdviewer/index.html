<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Viewer - RuBase Workshop</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a192f;
            color: #f8fafc;
            min-height: 100vh;
        }

        :root {
            --dark-bg: #0a192f;
            --bright-cyan: #00ffff;
            --bright-white: #ffffff;
            --light-gray: #c8c8c8;
            --bright-yellow: #ffff00;
            --bright-green: #00ff7f;
            --bright-red: #ff6347;
            --bright-orange: #ffa500;
            --bright-purple: #9370db;
            --dark-accent: #142847;
        }

        /* Partner Logos Header */
        .partner-logos {
            position: fixed;
            top: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
        }

        .partner-logos a {
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .partner-logos a:hover {
            opacity: 1;
        }

        .partner-logos img {
            height: 40px;
        }

        .header {
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--bright-cyan);
            padding: 15px 30px;
            margin-top: 100px;
            position: sticky;
            top: 0;
            z-index: 99;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--bright-cyan);
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: rgba(20, 40, 71, 0.9);
            border: 2px solid var(--bright-cyan);
            color: var(--bright-cyan);
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }

        .content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px;
        }

        /* Markdown content styling */
        .markdown-content {
            background: var(--dark-accent);
            border: 2px solid var(--bright-cyan);
            border-radius: 20px;
            padding: 40px;
            line-height: 1.8;
        }

        .markdown-content h1 {
            color: var(--bright-cyan);
            font-size: 2.5rem;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--bright-cyan);
            padding-bottom: 10px;
        }

        .markdown-content h2 {
            color: var(--bright-yellow);
            font-size: 2rem;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        .markdown-content h3 {
            color: var(--bright-green);
            font-size: 1.5rem;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .markdown-content p {
            color: var(--light-gray);
            margin-bottom: 15px;
        }

        .markdown-content ul, .markdown-content ol {
            color: var(--light-gray);
            margin-left: 30px;
            margin-bottom: 15px;
        }

        .markdown-content li {
            margin-bottom: 8px;
        }

        .markdown-content code {
            background: var(--dark-bg);
            color: var(--bright-green);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .markdown-content pre {
            background: var(--dark-bg);
            border: 1px solid var(--bright-cyan);
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 20px;
            position: relative;
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
        }

        .markdown-content img {
            max-width: 400px;
            height: auto;
            display: block;
            margin: 20px auto;
            border: 2px solid var(--bright-cyan);
            border-radius: 10px;
            padding: 10px;
            background: white;
        }

        .copy-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(20, 40, 71, 0.9);
            border: 1px solid var(--bright-cyan);
            color: var(--bright-cyan);
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .copy-button:hover {
            background: rgba(0, 255, 255, 0.15);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }

        .copy-button.copied {
            background: rgba(0, 255, 127, 0.2);
            border-color: var(--bright-green);
            color: var(--bright-green);
        }

        .markdown-content a {
            color: var(--bright-cyan);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .markdown-content a:hover {
            border-bottom-color: var(--bright-cyan);
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--bright-purple);
            padding-left: 20px;
            margin: 20px 0;
            color: var(--light-gray);
            font-style: italic;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .markdown-content th {
            background: var(--dark-bg);
            color: var(--bright-cyan);
            padding: 10px;
            text-align: left;
            border: 1px solid var(--bright-cyan);
        }

        .markdown-content td {
            padding: 10px;
            border: 1px solid var(--border-color);
            color: var(--light-gray);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--bright-cyan);
            font-size: 1.5rem;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: var(--bright-red);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <!-- Partner Logos Header -->
    <div class="partner-logos">
        <a href="https://hcss.nl" target="_blank" title="The Hague Centre for Strategic Studies">
            <img src="../openalex/hcss_logo.svg" alt="HCSS Logo">
        </a>
        <a href="https://hcss.nl/rubase/" target="_blank" title="RuBase">
            <img src="../openalex/rubase_logo.svg" alt="RuBase Logo">
        </a>
    </div>

    <header class="header">
        <div class="header-title" id="docTitle">Document Viewer</div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" onclick="goBack()">← Previous</button>
            <button class="nav-btn" onclick="window.location.href='../../index.html'">🏠 Home</button>
        </div>
    </header>

    <div class="content">
        <div id="mdContent" class="loading">Loading document...</div>
    </div>

    <script>
        // Get the file path from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const filePath = urlParams.get('file');
        const returnUrl = urlParams.get('return') || '../landing/index.html';

        function goBack() {
            window.location.href = returnUrl;
        }

        // Update previous button text based on return URL
        function updatePrevButtonText() {
            const prevBtn = document.getElementById('prevBtn');
            if (returnUrl.includes('resources')) {
                prevBtn.textContent = '← Resources';
            } else if (returnUrl.includes('landing')) {
                prevBtn.textContent = '← Overview';
            } else {
                prevBtn.textContent = '← Previous';
            }
        }

        async function loadMarkdownFile() {
            if (!filePath) {
                document.getElementById('mdContent').innerHTML = '<div class="error">No file specified</div>';
                return;
            }

            try {
                // Construct the full path
                const fullPath = '../../' + filePath;
                const response = await fetch(fullPath);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const text = await response.text();

                // Parse markdown to HTML
                const html = marked.parse(text);

                // Display the content
                document.getElementById('mdContent').className = 'markdown-content';
                document.getElementById('mdContent').innerHTML = html;

                // Add copy buttons to code blocks
                addCopyButtons();

                // Update title based on first heading
                const firstHeading = document.querySelector('.markdown-content h1');
                if (firstHeading) {
                    document.getElementById('docTitle').textContent = firstHeading.textContent;
                    document.title = firstHeading.textContent + ' - RuBase Workshop';
                }
            } catch (error) {
                document.getElementById('mdContent').className = 'error';
                document.getElementById('mdContent').innerHTML = `
                    <div>Error loading document: ${error.message}</div>
                    <div style="margin-top: 20px; font-size: 1rem;">File: ${filePath}</div>
                `;
            }
        }

        // Add copy buttons to code blocks after markdown is rendered
        function addCopyButtons() {
            const codeBlocks = document.querySelectorAll('.markdown-content pre');

            codeBlocks.forEach(pre => {
                // Skip if button already exists
                if (pre.querySelector('.copy-button')) return;

                // Create copy button
                const button = document.createElement('button');
                button.className = 'copy-button';
                button.textContent = 'Copy';

                // Add click handler
                button.addEventListener('click', async () => {
                    const code = pre.querySelector('code');
                    const text = code ? code.textContent : pre.textContent;

                    try {
                        await navigator.clipboard.writeText(text);
                        button.textContent = 'Copied!';
                        button.classList.add('copied');

                        setTimeout(() => {
                            button.textContent = 'Copy';
                            button.classList.remove('copied');
                        }, 2000);
                    } catch (err) {
                        // Fallback for older browsers
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        textarea.style.position = 'fixed';
                        textarea.style.opacity = '0';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);

                        button.textContent = 'Copied!';
                        button.classList.add('copied');

                        setTimeout(() => {
                            button.textContent = 'Copy';
                            button.classList.remove('copied');
                        }, 2000);
                    }
                });

                pre.style.position = 'relative';
                pre.appendChild(button);
            });
        }

        // Load the markdown file when page loads
        document.addEventListener('DOMContentLoaded', () => {
            updatePrevButtonText();
            loadMarkdownFile();
        });
    </script>
</body>
</html>
