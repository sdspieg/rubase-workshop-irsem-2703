<!DOCTYPE html>
<html lang="en">
<!-- HCSS_DASHBOARD_RESTYLE_2026_05_05 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WACKO Presentation</title>
    
    <link rel="stylesheet" href="slides.css">
    <style>
        /* HCSS_FULLSCREEN_CHIP — fixed bottom-right pill, dashboard palette */
        .hcss-fs-chip {
            position: fixed;
            bottom: 14px;
            right: 14px;
            z-index: 99999;
            background: rgba(26,55,97,.92);
            color: #dbad50;
            border: 1.5px solid #dbad50;
            border-radius: 18px;
            padding: .4rem .85rem;
            font-size: .8rem;
            font-weight: 700;
            font-family: system-ui, -apple-system, "Segoe UI", Helvetica, sans-serif;
            cursor: pointer;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: background .14s, color .14s;
            text-decoration: none;
            white-space: nowrap;
            line-height: 1;
        }
        .hcss-fs-chip:hover { background: #dbad50; color: #1a3761; }
        .hcss-fs-chip:active { transform: translateY(1px); }
        .hcss-fs-chip:fullscreen, html:fullscreen .hcss-fs-chip,
        :fullscreen .hcss-fs-chip { display: inline-flex; }
        /* Hide any pre-existing fullscreen button so we don't end up with two */
        .fullscreen-btn { display: none !important; }
        @media (max-width: 600px) {
            .hcss-fs-chip { padding: .3rem .55rem; font-size: .72rem; bottom: 10px; right: 10px; }
        }
        /* HCSS_SLIDE_FIT — full slide always visible, fully responsive */
        html, body { height: 100%; overflow: hidden; }
        .slide.active { overflow: visible; }

    </style>
    <!-- HCSS_FULLSCREEN_CHIP_2026_05_05 -->
    
<script>
(function(){
  if (window._hcssFsChipBound) return;
  window._hcssFsChipBound = true;
  window.toggleHcssFullscreen = function(){
    if (!document.fullscreenElement) {
      (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen).call(document.documentElement);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  };
})();
</script>
    <!-- HCSS_SLIDE_FIT_2026_05_05 -->
    
<script>
(function(){
  if (window._hcssSlideFitBound) return;
  window._hcssSlideFitBound = true;
  // Map: slide element → { w, h } natural dimensions measured before scaling.
  const naturals = new WeakMap();
  function measure(slide){
    const prev = slide.style.transform;
    slide.style.transform = '';
    const w = Math.max(slide.offsetWidth, slide.scrollWidth);
    const h = Math.max(slide.offsetHeight, slide.scrollHeight);
    slide.style.transform = prev;
    if (w && h) naturals.set(slide, { w, h });
  }
  function fit(){
    const slides = document.querySelectorAll('.slide');
    if (!slides.length) return;
    // Use chrome budget so prev/next/counter/fullscreen-chip don't get covered
    const reservedTop = 16, reservedBottom = 56, reservedX = 24;
    const availW = Math.max(200, window.innerWidth - reservedX * 2);
    const availH = Math.max(200, window.innerHeight - reservedTop - reservedBottom);
    slides.forEach(slide => {
      if (!naturals.has(slide)) measure(slide);
      const nat = naturals.get(slide);
      if (!nat) return;
      const scale = Math.min(availW / nat.w, availH / nat.h, 1);
      slide.style.transformOrigin = 'center top';
      slide.style.transform = scale < 1 ? `scale(${scale})` : '';
    });
  }
  let _t;
  function fitDebounced(){ clearTimeout(_t); _t = setTimeout(fit, 60); }
  window.addEventListener('resize', fitDebounced);
  window.addEventListener('orientationchange', fitDebounced);
  // Initial pass on load + a delayed re-measure (some decks lazy-load images
  // or apply layout post-load and the natural size only stabilises after
  // ~300-600 ms).
  function init(){ document.querySelectorAll('.slide').forEach(measure); fit(); }
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(init, 50);
  } else {
    window.addEventListener('DOMContentLoaded', init);
  }
  setTimeout(init, 600);
  // Re-fit when slides switch (.active class moves). Re-measure too — the
  // newly-active slide may have different natural dimensions than the
  // previous one.
  const mo = new MutationObserver(() => {
    document.querySelectorAll('.slide').forEach(s => { if (s.classList.contains('active') && !naturals.has(s)) measure(s); });
    fitDebounced();
  });
  mo.observe(document.body, { attributes: true, subtree: true, attributeFilter: ['class'] });
})();
</script>




    
</head>
<body>
    <button class="hcss-fs-chip" onclick="toggleHcssFullscreen()" title="Toggle fullscreen (F or Esc)">⛶ Fullscreen</button>
    <div class="presentation-container">
        <!-- Title Overlay -->
        <div class="title-overlay">
            <h1>🎯 WACKO</h1>
            <p>📊 Strategic Analysis & Insights</p>
        </div>

        <!-- Slides -->
        <div class="slide active" data-slide="1">
            <div class="slide-number">1 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-1.png" alt="Slide 1" onload="this.parentElement.classList.remove('loading')">
        </div>

        <div class="slide" data-slide="2">
            <div class="slide-number">2 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-2.png" alt="Slide 2" onload="this.parentElement.classList.remove('loading')">
        </div>

        <div class="slide" data-slide="3">
            <div class="slide-number">3 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-3.png" alt="Slide 3" onload="this.parentElement.classList.remove('loading')">
        </div>

        <div class="slide" data-slide="4">
            <div class="slide-number">4 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-4.png" alt="Slide 4" onload="this.parentElement.classList.remove('loading')">
        </div>

        <div class="slide" data-slide="5">
            <div class="slide-number">5 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-5.png" alt="Slide 5" onload="this.parentElement.classList.remove('loading')">
        </div>

        <!-- Navigation -->
        <div class="navigation">
            <button class="nav-btn" onclick="window.location.href='../../index.html'">🏠 Home</button>
            <button class="nav-btn" onclick="window.location.href='index.html'">📚 Resources</button>
            <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">← Previous</button>
            <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">Next →</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>

        <!-- Slide Indicator -->
        <div class="slide-indicator" id="slideIndicator">
            Slide 1 of 5
        </div>
    </div>

    <script>
        window.currentSlide = 1;
        window.totalSlides = 5;

        function showSlide(n) {
            const slides = document.querySelectorAll('.slide');

            // Wrap around
            if (n > window.totalSlides) window.currentSlide = 1;
            if (n < 1) window.currentSlide = window.totalSlides;

            // Hide all slides
            slides.forEach(slide => {
                slide.classList.remove('active');
            });

            // Show current slide
            slides[window.currentSlide - 1].classList.add('active');

            // Update navigation buttons
            document.getElementById('prevBtn').disabled = window.currentSlide === 1;
            document.getElementById('nextBtn').disabled = window.currentSlide === window.totalSlides;

            // Update progress bar
            const progressPercent = (window.currentSlide / window.totalSlides) * 100;
            document.getElementById('progressBar').style.width = progressPercent + '%';

            // Update slide indicator
            document.getElementById('slideIndicator').textContent = `Slide ${window.currentSlide} of ${window.totalSlides}`;
        }

        function changeSlide(direction) {
            window.currentSlide += direction;
            showSlide(window.currentSlide);
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowLeft') {
                changeSlide(-1);
            } else if (event.key === 'ArrowRight') {
                changeSlide(1);
            } else if (event.key === 'Home') {
                currentSlide = 1;
                showSlide(currentSlide);
            } else if (event.key === 'End') {
                currentSlide = totalSlides;
                showSlide(currentSlide);
            }
        });

        // Touch/swipe support for mobile
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', function(event) {
            touchStartX = event.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', function(event) {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) {
                changeSlide(1); // Swipe left = next slide
            }
            if (touchEndX > touchStartX + 50) {
                changeSlide(-1); // Swipe right = previous slide
            }
        }

        // Initialize
        showSlide(1);

        // Preload all images
        for (let i = 1; i <= totalSlides; i++) {
            const img = new Image();
            img.src = `wacko-slides/slide-${i}.png`;
        }
    </script>
</body>
</html>
