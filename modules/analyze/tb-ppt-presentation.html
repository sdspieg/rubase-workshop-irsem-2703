<script>
(function(){
  if (window._hcssSlideFitBound) return;
  window._hcssSlideFitBound = true;
  // Map: slide element → { w, h } natural dimensions measured before scaling.
  const naturals = new WeakMap();
  function measure(slide){
    const prev = slide.style.transform;
    slide.style.transform = '';
    const w = Math.max(slide.offsetWidth, slide.scrollWidth);
    const h = Math.max(slide.offsetHeight, slide.scrollHeight);
    slide.style.transform = prev;
    if (w && h) naturals.set(slide, { w, h });
  }
  function fit(){
    const slides = document.querySelectorAll('.slide');
    if (!slides.length) return;
    // Use chrome budget so prev/next/counter/fullscreen-chip don't get covered
    const reservedTop = 16, reservedBottom = 56, reservedX = 24;
    const availW = Math.max(200, window.innerWidth - reservedX * 2);
    const availH = Math.max(200, window.innerHeight - reservedTop - reservedBottom);
    slides.forEach(slide => {
      if (!naturals.has(slide)) measure(slide);
      const nat = naturals.get(slide);
      if (!nat) return;
      const scale = Math.min(availW / nat.w, availH / nat.h, 1);
      slide.style.transformOrigin = 'center top';
      slide.style.transform = scale < 1 ? `scale(${scale})` : '';
    });
  }
  let _t;
  function fitDebounced(){ clearTimeout(_t); _t = setTimeout(fit, 60); }
  window.addEventListener('resize', fitDebounced);
  window.addEventListener('orientationchange', fitDebounced);
  // Initial pass on load + a delayed re-measure (some decks lazy-load images
  // or apply layout post-load and the natural size only stabilises after
  // ~300-600 ms).
  function init(){ document.querySelectorAll('.slide').forEach(measure); fit(); }
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(init, 50);
  } else {
    window.addEventListener('DOMContentLoaded', init);
  }
  setTimeout(init, 600);
  // Re-fit when slides switch (.active class moves). Re-measure too — the
  // newly-active slide may have different natural dimensions than the
  // previous one.
  const mo = new MutationObserver(() => {
    document.querySelectorAll('.slide').forEach(s => { if (s.classList.contains('active') && !naturals.has(s)) measure(s); });
    fitDebounced();
  });
  if (document.body) mo.observe(document.body, { attributes: true, subtree: true, attributeFilter: ['class'] });
})();
</script>

    <script>
(function(){
  if (window._hcssPmBound) return;
  window._hcssPmBound = true;
  function build(){
    if (document.querySelector('.hcss-progress-monitor')) return;
    const slides = document.querySelectorAll('.slide');
    if (slides.length < 2) return;
    const pm = document.createElement('div');
    pm.className = 'hcss-progress-monitor';
    pm.setAttribute('aria-label', 'Slide progress');
    pm.innerHTML = '<button class="hcss-pm-btn hcss-pm-prev" type="button" title="Previous slide" aria-label="Previous slide">&#8249;</button>'
                 + '<div class="hcss-pm-dots" role="tablist"></div>'
                 + '<button class="hcss-pm-btn hcss-pm-next" type="button" title="Next slide" aria-label="Next slide">&#8250;</button>';
    document.body.appendChild(pm);
    const dotsContainer = pm.querySelector('.hcss-pm-dots');
    for (let i = 0; i < slides.length; i++) {
      const d = document.createElement('span');
      d.className = 'hcss-pm-dot';
      d.setAttribute('role', 'tab');
      d.setAttribute('tabindex', '0');
      d.setAttribute('aria-label', 'Slide ' + (i + 1));
      d.dataset.idx = i;
      d.onclick = () => goTo(i);
      d.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goTo(i); } };
      dotsContainer.appendChild(d);
    }
    function currentIdx(){
      let idx = 0;
      const all = document.querySelectorAll('.slide');
      all.forEach((s, i) => { if (s.classList.contains('active')) idx = i; });
      return idx;
    }
    function sync(){
      const cur = currentIdx();
      const total = document.querySelectorAll('.slide').length;
      dotsContainer.querySelectorAll('.hcss-pm-dot').forEach((d, i) => d.classList.toggle('active', i === cur));
      pm.querySelector('.hcss-pm-prev').disabled = cur <= 0;
      pm.querySelector('.hcss-pm-next').disabled = cur >= total - 1;
      const ad = dotsContainer.querySelector('.hcss-pm-dot.active');
      if (ad) ad.scrollIntoView({ block: 'nearest', inline: 'center' });
    }
    function goTo(i){
      const all = document.querySelectorAll('.slide');
      const n = all.length;
      i = Math.max(0, Math.min(n - 1, i));
      all.forEach((s, idx) => s.classList.toggle('active', idx === i));
      if (typeof window.showSlide === 'function') { try { window.showSlide(i); } catch (e) {} }
      if (typeof window.goToSlide === 'function') { try { window.goToSlide(i); } catch (e) {} }
      if (typeof window.currentSlide !== 'undefined') { try { window.currentSlide = i; } catch (e) {} }
      sync();
    }
    pm.querySelector('.hcss-pm-prev').onclick = () => goTo(currentIdx() - 1);
    pm.querySelector('.hcss-pm-next').onclick = () => goTo(currentIdx() + 1);
    (document.body && new MutationObserver(() => sync()).observe(document.body, { attributes: true, subtree: true, attributeFilter: ['class'] }));
    sync();
  }
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(build, 100);
  } else {
    window.addEventListener('DOMContentLoaded', () => setTimeout(build, 100));
  }
  setTimeout(build, 800);
})();
</script>
