<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Cartography - RuBase Workshop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap');

        :root {
            --dark-bg: #0a192f;
            --bright-cyan: #00ffff;
            --bright-white: #ffffff;
            --light-gray: #c8c8c8;
            --bright-yellow: #ffff00;
            --bright-green: #00ff7f;
            --bright-red: #ff6347;
            --bright-orange: #ffa500;
            --bright-purple: #9370db;
            --dark-accent: #142847;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Titillium Web', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--dark-bg);
            color: var(--bright-white);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--dark-accent), rgba(147, 112, 219, 0.1));
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--bright-purple);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--bright-purple);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--light-gray);
            font-size: 1.2rem;
        }

        /* Slideshow Container */
        .slideshow-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Slides */
        .slide {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
            max-width: 100%;
            max-height: 100%;
            text-align: center;
        }

        .slide.active {
            display: block;
        }

        .slide img {
            max-width: 100%;
            max-height: calc(100vh - 200px);
            object-fit: contain;
            border: 3px solid var(--bright-purple);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(147, 112, 219, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Navigation Controls */
        .nav-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 1000;
        }

        .nav-btn {
            background: linear-gradient(135deg, var(--bright-purple), var(--bright-cyan));
            color: var(--dark-bg);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1rem;
        }

        .nav-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(147, 112, 219, 0.5);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress Indicators */
        .progress-container {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s;
        }

        .progress-dot.active {
            background: var(--bright-purple);
            box-shadow: 0 0 20px var(--bright-purple);
            transform: scale(1.5);
        }

        /* Slide Counter */
        .slide-counter {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(20, 40, 71, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid var(--bright-purple);
            font-size: 1.1rem;
            color: var(--bright-cyan);
            font-weight: 700;
        }

        /* Home Button */
        .home-button {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(20, 40, 71, 0.9);
            border: 2px solid var(--bright-cyan);
            color: var(--bright-cyan);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .home-button:hover {
            background: rgba(0, 255, 255, 0.15);
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.4);
        }

        /* Keyboard hint */
        .keyboard-hint {
            position: absolute;
            bottom: 10px;
            right: 30px;
            color: var(--light-gray);
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Side navigation arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            color: var(--bright-purple);
            cursor: pointer;
            padding: 20px;
            transition: all 0.3s;
            opacity: 0.5;
            background: rgba(20, 40, 71, 0.5);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-arrow:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
            background: rgba(147, 112, 219, 0.2);
        }

        .nav-arrow.prev {
            left: 30px;
        }

        .nav-arrow.next {
            right: 30px;
        }

        /* Fullscreen button */
        .fullscreen-btn {
            position: absolute;
            top: 30px;
            right: 200px;
            background: rgba(20, 40, 71, 0.9);
            border: 2px solid var(--bright-green);
            color: var(--bright-green);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 127, 0.15);
            transform: scale(1.05);
        }

        /* Loading indicator */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--bright-cyan);
            font-size: 1.5rem;
            display: none;
        }

        .loading.active {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>🗺️ Knowledge Cartography</h1>
        <p>Mapping the Landscape of Research</p>
    </div>

    <!-- Home Button -->
    <a href="../../index.html" class="home-button">🏠 Home</a>

    <!-- Fullscreen Button -->
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <!-- Slide Counter -->
    <div class="slide-counter">
        <span id="current-slide">1</span> / <span id="total-slides">10</span>
    </div>

    <!-- Loading Indicator -->
    <div class="loading" id="loading">Loading slides...</div>

    <!-- Slideshow Container -->
    <div class="slideshow-container">
        <!-- Navigation Arrows -->
        <div class="nav-arrow prev" onclick="previousSlide()">‹</div>
        <div class="nav-arrow next" onclick="nextSlide()">›</div>

        <!-- Slides will be dynamically inserted here -->
        <div class="slide active">
            <img src="images/slide_1.png" alt="Slide 1" loading="eager">
        </div>
        <div class="slide">
            <img src="images/slide_2.png" alt="Slide 2" loading="lazy">
        </div>
        <div class="slide">
            <img src="images/slide_3.png" alt="Slide 3" loading="lazy">
        </div>
        <div class="slide">
            <img src="images/slide_4.png" alt="Slide 4" loading="lazy">
        </div>
        <div class="slide">
            <img src="images/slide_5.png" alt="Slide 5" loading="lazy">
        </div>
        <div class="slide">
            <img src="images/slide_6.png" alt="Slide 6" loading="lazy">
        </div>
        <div class="slide">
            <img src="images/slide_7.png" alt="Slide 7" loading="lazy">
        </div>
        <div class="slide">
            <img src="images/slide_8.png" alt="Slide 8" loading="lazy">
        </div>
        <div class="slide">
            <img src="images/slide_9.png" alt="Slide 9" loading="lazy">
        </div>
        <div class="slide">
            <img src="images/slide_10.png" alt="Slide 10" loading="lazy">
        </div>
    </div>

    <!-- Progress Indicators -->
    <div class="progress-container">
        <div class="progress-dot active" onclick="goToSlide(0)"></div>
        <div class="progress-dot" onclick="goToSlide(1)"></div>
        <div class="progress-dot" onclick="goToSlide(2)"></div>
        <div class="progress-dot" onclick="goToSlide(3)"></div>
        <div class="progress-dot" onclick="goToSlide(4)"></div>
        <div class="progress-dot" onclick="goToSlide(5)"></div>
        <div class="progress-dot" onclick="goToSlide(6)"></div>
        <div class="progress-dot" onclick="goToSlide(7)"></div>
        <div class="progress-dot" onclick="goToSlide(8)"></div>
        <div class="progress-dot" onclick="goToSlide(9)"></div>
    </div>

    <!-- Navigation Controls -->
    <div class="nav-controls">
        <button class="nav-btn" onclick="previousSlide()">← Previous</button>
        <button class="nav-btn" onclick="goToSlide(0)">First</button>
        <button class="nav-btn" onclick="nextSlide()">Next →</button>
    </div>

    <!-- Keyboard Hint -->
    <div class="keyboard-hint">
        Use arrow keys to navigate • ESC for first slide
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.progress-dot');
        const totalSlides = slides.length;

        // Update total slides counter
        document.getElementById('total-slides').textContent = totalSlides;

        function showSlide(index) {
            // Hide loading indicator
            document.getElementById('loading').classList.remove('active');

            // Remove active class from all slides and dots
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));

            // Wrap around if needed
            if (index >= totalSlides) index = 0;
            if (index < 0) index = totalSlides - 1;
            currentSlide = index;

            // Show current slide
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');

            // Update counter
            document.getElementById('current-slide').textContent = currentSlide + 1;

            // Preload next slide
            if (currentSlide < totalSlides - 1) {
                const nextImg = slides[currentSlide + 1].querySelector('img');
                if (nextImg) nextImg.loading = 'eager';
            }
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function previousSlide() {
            showSlide(currentSlide - 1);
        }

        function goToSlide(index) {
            showSlide(index);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowRight':
                case ' ':  // Spacebar
                    e.preventDefault();
                    nextSlide();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    previousSlide();
                    break;
                case 'Escape':
                    e.preventDefault();
                    goToSlide(0);
                    break;
                case 'Home':
                    e.preventDefault();
                    goToSlide(0);
                    break;
                case 'End':
                    e.preventDefault();
                    goToSlide(totalSlides - 1);
                    break;
                case 'f':
                case 'F':
                    e.preventDefault();
                    toggleFullscreen();
                    break;
            }

            // Number keys for direct slide navigation
            if (e.key >= '1' && e.key <= '9') {
                const slideNum = parseInt(e.key) - 1;
                if (slideNum < totalSlides) {
                    goToSlide(slideNum);
                }
            }
            if (e.key === '0') {
                goToSlide(9); // Slide 10
            }
        });

        // Touch support for mobile
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) nextSlide();
            if (touchEndX > touchStartX + 50) previousSlide();
        }

        // Preload all images
        window.addEventListener('load', () => {
            slides.forEach((slide, index) => {
                const img = slide.querySelector('img');
                if (img && index > 0) {
                    const preloadImg = new Image();
                    preloadImg.src = img.src;
                }
            });
        });

        // Initialize
        showSlide(0);
    </script>
</body>
</html>
